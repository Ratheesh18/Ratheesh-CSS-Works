<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Text page</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='./Text.css'>
</head>
<body>

    <div class="textalignment">Hi,My name is Ratheesh</div>

    <!-- Letter spacing -->
    <div class="letterspacing">Okey</div>
    
</body>
</html>
