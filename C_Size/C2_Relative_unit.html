<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Relative page</title>
    <link rel='stylesheet' type='text/css' media='screen' href='./C2_Relative_unit.css'>
    
</head>
<body>
    <!-- Percentage -->
     <div class="percentage">
     <div class="box">
        <div class="color">
            hello
        </div>
     </div>
    </div>
    <br>
    <!-- em -->
     <div class="em">
        <div class="box">
            <div class="color">
                welcome
            </div>
        </div>
     </div>
     <br>
    <!-- rem -->
     <div class="rem">
        My text
     </div>
    <br>
    <!-- viewport width/height -->
     <div class="vwvh">
        my height and width
     </div>
    <br>
     <!-- viewport minimum hight/width -->
      <div class="vmin">
        minimum
      </div>
      <br>
      <div class="vmax">
        Maximum
      </div>
    </body>
</html>
